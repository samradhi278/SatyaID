<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | SatyaID</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <style>
        html { scroll-behavior: smooth; }
        .blob {
            position: fixed;
            width: 600px;
            height: 600px;
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.15) 0%, rgba(37, 99, 235, 0.1) 100%);
            filter: blur(80px);
            border-radius: 50%;
            z-index: -1;
            animation: move 25s infinite alternate;
        }
        @keyframes move {
            from { transform: translate(-10%, -10%) rotate(0deg); }
            to { transform: translate(15%, 15%) rotate(10deg); }
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
        }
        .dark .glass-card {
            background: rgba(31, 41, 55, 0.9);
        }
    </style>
    <script>
        if (localStorage.getItem('theme') === 'dark' || 
            (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
    </script>
</head>

<body class="bg-gray-50 dark:bg-gray-900 font-sans antialiased transition-colors duration-300 min-h-screen overflow-x-hidden">

    <div class="blob" style="top: -10%; left: -5%;"></div>
    <div class="blob" style="bottom: -10%; right: -5%; animation-delay: -5s;"></div>

    <div class="container mx-auto px-6 py-12 relative z-10">
        
        <div class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4">
            <div>
                <h1 class="text-5xl font-black text-gray-900 dark:text-white tracking-tight">
                    Admin <span class="text-blue-600">Dashboard</span>
                </h1>
                <p class="text-2xl text-gray-500 dark:text-gray-400">Manage and verify registered officials</p>
            </div>
            
            <div class="flex items-center gap-4">
                <button onclick="toggleLogoutModal(true)" class="flex items-center gap-2 bg-red-50 hover:bg-red-100 dark:bg-red-900/20 dark:hover:bg-red-900/40 text-red-600 dark:text-red-400 px-5 py-2.5 rounded-2xl font-bold text-xl transition duration-300 border border-red-100 dark:border-red-800 shadow-sm transform active:scale-95">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                </svg>
                    LOGOUT
                </button>
            </div>
        </div>

        <div class="mb-6 flex flex-col md:flex-row gap-4 items-center">
            <div class="relative flex-grow w-full">
                <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-gray-400">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                </span>
                <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="Search officials..." 
                    class="w-full pl-12 pr-4 py-4 rounded-2xl bg-white dark:bg-gray-800 border border-gray-100 dark:border-gray-700 shadow-sm focus:ring-2 focus:ring-blue-400 outline-none transition dark:text-white">
            </div>

            <button onclick="exportToCSV()" class="w-full md:w-auto flex items-center justify-center gap-2 bg-white dark:bg-gray-800 text-gray-700 dark:text-gray-200 px-6 py-4 rounded-2xl font-bold text-sm border border-gray-100 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-700 transition shadow-sm transform active:scale-95 whitespace-nowrap">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                </svg>
                EXPORT CSV
            </button>
        </div>

        <div class="glass-card rounded-3xl shadow-2xl border border-gray-100 dark:border-gray-700 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left" id="officialsTable">
                    <thead>
                        <tr class="bg-gray-50/50 dark:bg-gray-800/50 border-b border-gray-100 dark:border-gray-700">
                            <th class="p-5 text-xs font-bold uppercase tracking-wider text-gray-500 dark:text-gray-400">Official Name</th>
                            <th class="p-5 text-xs font-bold uppercase tracking-wider text-gray-500 dark:text-gray-400">Email Address</th>
                            <th class="p-5 text-xs font-bold uppercase tracking-wider text-gray-500 dark:text-gray-400 text-center">Status</th>
                            <th class="p-5 text-xs font-bold uppercase tracking-wider text-gray-500 dark:text-gray-400 text-center">Actions</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-100 dark:divide-gray-700">
                        {% for o in officials %}
                        <tr class="official-row hover:bg-blue-50/30 dark:hover:bg-blue-900/10 transition duration-200">
                            <td class="p-5 font-bold text-gray-800 dark:text-gray-200 official-name">{{ o.name }}</td>
                            <td class="p-5 text-gray-600 dark:text-gray-400 text-sm official-email">{{ o.email }}</td>
                            <td class="p-5 text-center">
                                <span class="inline-flex items-center px-3 py-1 rounded-full text-xs font-bold status-badge 
                                    {% if o.status == 'PENDING' %} bg-yellow-100 text-yellow-700 dark:bg-yellow-900/30 dark:text-yellow-400
                                    {% elif o.status == 'APPROVED' %} bg-green-100 text-green-700 dark:bg-green-900/30 dark:text-green-400
                                    {% else %} bg-red-100 text-red-700 dark:bg-red-900/30 dark:text-red-400 {% endif %}">
                                    {{ o.status }}
                                </span>
                            </td>
                            <td class="p-5 text-center">
                                {% if o.status == "PENDING" %}
                                    <div class="flex items-center justify-center gap-3">
                                        <a href="{{ url_for('approve_official', index=loop.index0) }}" class="bg-blue-600 hover:bg-blue-700 text-white text-xs font-bold px-4 py-2 rounded-xl transition transform active:scale-95">Approve</a>
                                        <a href="{{ url_for('reject_official', index=loop.index0) }}" class="bg-white dark:bg-gray-700 border border-gray-200 dark:border-gray-600 text-gray-700 dark:text-gray-200 text-xs font-bold px-4 py-2 rounded-xl transition transform active:scale-95">Reject</a>
                                    </div>
                                {% else %}
                                    <span class="text-xs font-semibold text-gray-400 uppercase">Processed</span>
                                {% endif %}
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="logoutModal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-md flex items-center justify-center z-[100]">
        <div class="bg-white dark:bg-gray-800 p-8 rounded-3xl shadow-2xl border border-gray-100 dark:border-gray-700 max-w-sm w-full mx-4">
            <h3 class="text-xl font-black text-gray-900 dark:text-white text-center mb-8">Confirm Logout?</h3>
            <div class="flex flex-col gap-3">
                <a href="page1.html" class="w-full bg-red-600 hover:bg-red-700 text-white py-3 rounded-2xl font-bold text-center">Logout</a>
                <button onclick="toggleLogoutModal(false)" class="w-full bg-gray-100 dark:bg-gray-700 text-gray-700 dark:text-gray-200 py-3 rounded-2xl font-bold">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        function toggleLogoutModal(show) { document.getElementById('logoutModal').classList.toggle('hidden', !show); }

        function filterTable() {
            const filter = document.getElementById('searchInput').value.toLowerCase();
            const rows = document.getElementsByClassName('official-row');
            Array.from(rows).forEach(row => {
                const text = row.innerText.toLowerCase();
                row.style.display = text.includes(filter) ? "" : "none";
            });
        }

        function exportToCSV() {
            let csv = "Name,Email,Status\n";
            const rows = document.querySelectorAll(".official-row");
            rows.forEach(row => {
                const name = row.querySelector(".official-name").innerText;
                const email = row.querySelector(".official-email").innerText;
                const status = row.querySelector(".status-badge").innerText.replace("● ", "").replace("✓ ", "").replace("✕ ", "");
                csv += `${name},${email},${status}\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.setAttribute('hidden', '');
            a.setAttribute('href', url);
            a.setAttribute('download', 'SatyaID_Officials.csv');
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }
    </script>
</body>
</html>
