<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | SatyaID</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <style>
        .perspective {
            perspective: 1000px;
        }

        html {
            scroll-behavior: smooth;
        }

        .blob {
            position: absolute;
            width: 500px;
            height: 500px;
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.2) 0%, rgba(37, 99, 235, 0.2) 100%);
            filter: blur(80px);
            border-radius: 50%;
            z-index: -1;
            animation: move 20s infinite alternate;
        }

        @keyframes move {
            from {
                transform: translate(-10%, -10%);
            }

            to {
                transform: translate(20%, 20%);
            }
        }

        .float-anim {
            animation: float 5s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0px) rotate(0deg);
            }

            50% {
                transform: translateY(-15px) rotate(1deg);
            }
        }
    </style>
</head>

<body
    class="bg-gray-50 dark:bg-gray-900 font-sans antialiased transition-colors duration-300 min-h-screen flex items-center justify-center p-4 overflow-hidden">

    <div class="blob" style="top: -10%; left: -10%;"></div>
    <div class="blob" style="bottom: -10%; right: -10%; animation-delay: -5s;"></div>

    <div class="w-full max-w-6xl grid grid-cols-1 lg:grid-cols-2 items-center gap-8 relative z-10">

        <div class="w-full max-w-md mx-auto lg:ml-auto perspective">
            <div
                class="bg-white dark:bg-gray-800 p-8 rounded-3xl shadow-2xl border border-gray-100 dark:border-gray-700 relative z-10 transform transition duration-500">

                <div class="text-center mb-8">
                    <h1 class="text-4xl font-black tracking-widest italic text-blue-700 dark:text-blue-400 mb-2">SatyaID
                    </h1>
                    <p class="text-gray-500 dark:text-gray-400 uppercase tracking-widest text-xs font-bold">Create Your
                        Secure Account</p>
                </div>

                <form method="POST" onsubmit="showPopup(event)" class="space-y-4">
                    <div class="relative">
                        <input name="name" type="text" placeholder="Full Name"
                            class="w-full bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 p-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-400 dark:text-white transition"
                            required>
                    </div>

                    <div class="relative">
                        <input name="email" type="email" placeholder="Email Address"
                            class="w-full bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 p-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-400 dark:text-white transition"
                            required>
                    </div>

                    <div class="relative">
                        <input name="contact" type="text" placeholder="Contact Number"
                            class="w-full bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 p-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-400 dark:text-white transition"
                            required>
                    </div>

                    <div class="relative">
                        <input name="password" type="password" placeholder="Password"
                            class="w-full bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 p-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-400 dark:text-white transition"
                            required>
                    </div>

                    <div class="relative">
                        <input name="application_number" type="text" placeholder="Application Number"
                            class="w-full bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 p-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-400 dark:text-white transition"
                            required>
                    </div>

                    <div class="relative">
                        <label class="text-[10px] uppercase tracking-widest text-gray-400 ml-2 mb-1 block">Account
                            Type</label>
                        <input type="text" name="role" value="USER" readonly
                            class="w-full border border-gray-200 dark:border-gray-600 bg-gray-100 dark:bg-gray-900/50 p-3 rounded-xl text-gray-500 dark:text-gray-400 font-bold cursor-not-allowed">
                    </div>

                    <button
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-xl font-bold shadow-lg shadow-blue-500/30 transition-all duration-300 transform hover:-translate-y-1 active:scale-95 uppercase tracking-widest">
                        Register Now
                    </button>
                </form>

                <div class="mt-8 pt-6 border-t border-gray-100 dark:border-gray-700 text-center">
                    <p class="text-sm text-gray-600 dark:text-gray-400">
                        Already have an account?
                        <a href="{{ url_for('login') }}" class="text-blue-600 dark:text-blue-400 font-bold hover:underline ml-1">Login
                            here</a>
                    </p>
                </div>
            </div>
        </div>

        <div class="hidden lg:flex flex-col items-start justify-center p-8 space-y-6">
            <div class="space-y-2">
                <h2 class="text-5xl font-black text-gray-800 dark:text-white leading-tight">
                    Let's get <br>
                    <span class="text-blue-600 dark:text-blue-400">started.</span>
                </h2>
                <div class="h-1.5 w-20 bg-blue-600 rounded-full"></div>
                <p class="text-gray-500 dark:text-gray-400 text-lg font-medium max-w-sm pt-4">
                    Start verifying documents in just a few clicks.
                </p>
            </div>

            <div class="float-anim w-full max-w-sm">
                <svg viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg" class="w-full h-auto drop-shadow-3xl">
                    <defs>
                        <linearGradient id="userGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
                        </linearGradient>
                        <linearGradient id="scanGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                            <stop offset="0%" stop-color="#3b82f6" stop-opacity="0" />
                            <stop offset="50%" stop-color="#60a5fa" stop-opacity="0.6" />
                            <stop offset="100%" stop-color="#3b82f6" stop-opacity="0" />
                        </linearGradient>
                    </defs>

                    <circle cx="120" cy="120" r="100" fill="url(#userGrad)" opacity="0.05" />

                    <g fill="#1f2937" class="dark:fill-gray-300">
                        <circle cx="120" cy="70" r="30" />
                        <path d="M60 180 C60 140 80 115 120 115 C160 115 180 140 180 180 L180 210 L60 210 Z" />
                    </g>

                    <rect x="50" y="80" width="140" height="40" fill="url(#scanGrad)">
                        <animate attributeName="y" values="60;160;60" dur="4s" repeatCount="indefinite" />
                    </rect>

                    <g stroke="#3b82f6" stroke-width="3" fill="none" opacity="0.8">
                        <path d="M70 60 L50 60 L50 80" />
                        <path d="M170 60 L190 60 L190 80" />
                        <path d="M70 180 L50 180 L50 160" />
                        <path d="M170 180 L190 180 L190 160" />
                    </g>

                    <circle cx="185" cy="100" r="15" fill="#10b981" />
                    <path d="M178 100 L183 105 L192 96" stroke="white" stroke-width="3" stroke-linecap="round"
                        stroke-linejoin="round" fill="none" />
                </svg>
            </div>


        </div>
    </div>

    <div id="popup" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-blue-900/40 backdrop-blur-sm"></div>
        <div
            class="bg-white dark:bg-gray-800 p-8 rounded-[2rem] shadow-2xl text-center relative z-10 border border-green-100 dark:border-green-900/30 max-w-xs w-full transform scale-110">
            <div
                class="w-16 h-16 bg-green-100 dark:bg-green-900/30 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg class="w-8 h-8 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path>
                </svg>
            </div>
            <h2 class="text-2xl font-black text-gray-800 dark:text-white mb-2">Success!</h2>
            <p class="text-gray-600 dark:text-gray-400">Registration complete. Redirecting to login...</p>
        </div>
    </div>

    <script>
        function showPopup(event) {
            event.preventDefault();
            document.getElementById('popup').classList.remove('hidden');
            setTimeout(() => {
                event.target.submit();
            }, 1800);
        }

        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
    </script>
</body>

</html>
