<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | SatyaID</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <style>
        .perspective {
            perspective: 1000px;
        }

        html {
            scroll-behavior: smooth;
        }

        .blob {
            position: absolute;
            width: 500px;
            height: 500px;
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.2) 0%, rgba(37, 99, 235, 0.2) 100%);
            filter: blur(80px);
            border-radius: 50%;
            z-index: -1;
            animation: move 20s infinite alternate;
        }

        @keyframes move {
            from {
                transform: translate(-10%, -10%);
            }

            to {
                transform: translate(20%, 20%);
            }
        }

        .float-anim {
            animation: float 5s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0px) rotate(0deg);
            }

            50% {
                transform: translateY(-15px) rotate(1deg);
            }
        }
    </style>
</head>

<body
    class="bg-gray-900 font-sans antialiased transition-colors duration-300 min-h-screen flex items-start justify-center pt-16 p-4 overflow-x-hidden overflow-y-auto">
    <div class="blob" style="top: -10%; left: -10%;"></div>
    <div class="blob" style="bottom: -10%; right: -10%; animation-delay: -5s;"></div>

    <div class="w-full max-w-6xl grid grid-cols-1 lg:grid-cols-2 items-center gap-8 relative z-10">

        <div class="w-full max-w-md mx-auto lg:ml-auto perspective">
            <div
                class="bg-gray-800 p-8 rounded-3xl shadow-2xl border border-gray-700 relative z-10 transform transition duration-500">

                <div class="text-center mb-8">
                    <h1 class="text-4xl font-black tracking-widest italic text-blue-400 mb-2">SatyaID</h1>
                    <p class="text-gray-400 uppercase tracking-widest text-xs font-bold">
                        Create Your Secure Account
                    </p>
                </div>

                <form method="POST" onsubmit="showPopup(event)" class="space-y-4">

                    <input name="name" type="text" placeholder="Full Name"
                        class="w-full bg-gray-700 border border-gray-600 p-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-400 text-white transition"
                        required>

                    <input name="email" type="email" placeholder="Email Address"
                        class="w-full bg-gray-700 border border-gray-600 p-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-400 text-white transition"
                        required>

                    <input name="contact" type="text" placeholder="Contact Number"
                        class="w-full bg-gray-700 border border-gray-600 p-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-400 text-white transition"
                        required>

                    <div class="relative">
                        <input type="password" id="password" name="password" placeholder="Password"
                            pattern="^(?=.*[0-9])(?=.*[!@#$%^&*])[A-Za-z0-9!@#$%^&*]{8,}$"
                            title="Password must be at least 8 characters long, include at least 1 digit and 1 special character"
                            class="w-full border border-gray-700 p-4 pr-12 rounded-2xl focus:ring-2 focus:ring-blue-400 bg-gray-700 text-white outline-none transition"
                            required>
                        <button type="button" onclick="togglePassword()"
                            class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-white">
                            <span id="toggleText">Show</span>
                        </button>
                    </div>

                    <input name="application_number" type="text" placeholder="Application Number"
                        class="w-full bg-gray-700 border border-gray-600 p-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-400 text-white transition"
                        required>

                    <div>
                        <label class="text-[10px] uppercase tracking-widest text-gray-400 ml-2 mb-1 block">
                            Account Type
                        </label>
                        <input type="text" name="role" value="USER" readonly
                            class="w-full border border-gray-600 bg-gray-900/50 p-3 rounded-xl text-gray-400 font-bold cursor-not-allowed">
                    </div>

                    <button
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-xl font-bold shadow-lg shadow-blue-500/30 transition-all duration-300 transform hover:-translate-y-1 active:scale-95 uppercase tracking-widest">
                        Register Now
                    </button>
                </form>

                <div class="mt-8 pt-6 border-t border-gray-700 text-center">
                    <p class="text-sm text-gray-400">
                        Already have an account?
                        <a href="{{ url_for('login') }}" class="text-blue-400 font-bold hover:underline ml-1">
                            Login here
                        </a>
                    </p>
                </div>
            </div>
        </div>

        <div class="hidden lg:flex flex-col items-start justify-center p-8 space-y-6">
            <div class="space-y-2">
                <h2 class="text-5xl font-black text-white leading-tight">
                    Let's get <br>
                    <span class="text-blue-400">started.</span>
                </h2>
                <div class="h-1.5 w-20 bg-blue-600 rounded-full"></div>
                <p class="text-gray-400 text-lg font-medium max-w-sm pt-4">
                    Start verifying documents in just a few clicks.
                </p>
            </div>

            <div class="float-anim w-full max-w-sm">
                <!-- SVG unchanged -->
            </div>
        </div>
    </div>

    <div id="popup" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-blue-900/40 backdrop-blur-sm"></div>
        <div
            class="bg-gray-800 p-8 rounded-[2rem] shadow-2xl text-center relative z-10 border border-blue-900/30 max-w-xs w-full">

            <div class="w-16 h-16 bg-blue-900/30 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg class="w-8 h-8 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path>
                </svg>
            </div>

            <h2 class="text-2xl font-black text-white mb-2">Registration Complete</h2>
            <p class="text-gray-400 text-sm">
                Waiting for approval. You will be notified soon.
            </p>

            <button onclick="submitForm()"
                class="mt-6 px-6 py-2 bg-blue-600 hover:bg-blue-700 rounded-lg text-white font-bold">
                OK
            </button>
        </div>
    </div>

    <script>
        function submitForm() {
            document.querySelector("form").submit();
        }
        function showPopup(event) {
            event.preventDefault();
            const password = document.getElementById('password').value;
            const pattern = /^(?=.*[0-9])(?=.*[!@#$%^&*])[A-Za-z0-9!@#$%^&*]{8,}$/;

            if (!pattern.test(password)) {
                alert("Password must be at least 8 characters long and include at least 1 digit and 1 special character.");
                return;
            }
            document.getElementById('popup').classList.remove('hidden');
        }
        document.documentElement.classList.add('dark');

        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleText = document.getElementById('toggleText');

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleText.innerText = 'Hide';
            } else {
                passwordInput.type = 'password';
                toggleText.innerText = 'Show';
            }
        }
        function closePopup() {
            document.getElementById('popup').classList.add('hidden');
        }
    </script>
</body>
