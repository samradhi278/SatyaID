<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Official Details</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

<div class="bg-white p-8 rounded-xl shadow w-96">

    <h2 class="text-xl font-semibold mb-6 text-center">Official Details</h2>

    <form method="POST">

        <input type="text" name="official_id" placeholder="Official ID"
               class="w-full border p-2 mb-4 rounded" required>

        <input type="text" name="name" placeholder="Full Name"
               class="w-full border p-2 mb-4 rounded" required>

        <input type="email" name="email" placeholder="Email Address"
               class="w-full border p-2 mb-4 rounded" required>

        <input type="text" name="address" placeholder="Address"
               class="w-full border p-2 mb-4 rounded" required>

        <input type="password" name="password" placeholder="Password"
               class="w-full border p-2 mb-4 rounded" required>

        <input type="text" name="aadhaar" placeholder="Aadhaar Number"
               class="w-full border p-2 mb-4 rounded" required>

        <input type="text" name="pan" placeholder="PAN Number"
               class="w-full border p-2 mb-4 rounded" required>

        <input type="text" name="contact" placeholder="Contact Number"
               class="w-full border p-2 mb-6 rounded" required>

        <!-- NEXT BUTTON -->
        <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-full">
            Next →
        </button>

    </form>

</div>

</body>
</html>
