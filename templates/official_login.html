<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Official Login | SatyaID</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-r from-gray-200 to-gray-400 flex items-center justify-center min-h-screen">

<div class="bg-white p-8 rounded-2xl shadow-2xl w-96">

    <h1 class="text-3xl font-bold text-center text-blue-600 mb-2">SatyaID</h1>
    <p class="text-center text-gray-500 mb-6">Official Login</p>

    <form method="POST">

        <input type="text" name="name"
               placeholder="Official Name"
               class="w-full border p-3 mb-4 rounded-lg focus:ring-2 focus:ring-blue-400"
               required>

        <input type="email" name="email"
               placeholder="Official Email"
               class="w-full border p-3 mb-4 rounded-lg focus:ring-2 focus:ring-blue-400"
               required>

        <input type="password" name="password"
               placeholder="Password"
               class="w-full border p-3 mb-6 rounded-lg focus:ring-2 focus:ring-blue-400"
               required>

        <button class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-lg font-semibold">
            LOGIN
        </button>

    </form>

    <p class="text-center text-sm text-gray-600 mt-4">
        Not registered?
        <a href="/" class="text-blue-600 font-semibold hover:underline">
            Go Back
        </a>
    </p>

</div>

</body>
</html>
