<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Document | SatyaID</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <style>
        html { 
            scroll-behavior: smooth; 
            -webkit-text-size-adjust: 100%; 
            text-size-adjust: 100%; 
        }
        
        .perspective { perspective: 1000px; }
        
        .blob {
            position: absolute;
            width: 600px;
            height: 600px;
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.15) 0%, rgba(37, 99, 235, 0.1) 100%);
            filter: blur(80px);
            border-radius: 50%;
            z-index: -1;
            animation: move 25s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-10%, -10%) rotate(0deg); }
            to { transform: translate(15%, 15%) rotate(10deg); }
        }

        .drag-over {
            border-color: #3b82f6 !important;
            background-color: rgba(59, 130, 246, 0.05) !important;
            transform: scale(1.02);
        }
    </style>
    <script>
            document.documentElement.classList.remove('dark');
    </script>
</head>

<body class="bg-gray-900 text-gray-100 font-sans antialiased transition-colors duration-300 min-h-screen flex items-center justify-center overflow-x-hidden relative">

    <a href="{{ url_for('login') }}" 
    class="fixed top-8 left-8 z-50 flex items-center gap-2 px-5 py-2.5 bg-gray-800 text-gray-300 rounded-2xl shadow-lg border border-gray-700 font-semibold hover:text-blue-400 transition-all duration-300 group active:scale-95">

        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 transform group-hover:-translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
        </svg>
        Back to Login
    </a>

    <div class="blob" style="top: -10%; left: -5%;"></div>
    <div class="blob" style="bottom: -10%; right: -5%; animation-delay: -5s;"></div>

    <div class="container mx-auto px-6 py-12 flex flex-col lg:flex-row items-center justify-center gap-16 relative z-10">
        
        <div class="max-w-lg text-center lg:text-left space-y-8">
            <div class="space-y-4">
                <h2 class="text-4xl lg:text-5xl font-extrabold text-white leading-tight">
                    Smart AI <span class="text-blue-600">Verification.</span>
                </h2>
                <p class="text-lg text-gray-400">
                    Upload your Government IDs for instant, tamper-proof verification powered by AI.
                </p>
            </div>
        </div>

            <div class="w-full max-w-md perspective">
                <div
                    class="bg-gray-800 p-8 rounded-3xl shadow-2xl transform hover:scale-[1.01] transition duration-500 border border-gray-700">
            
                    <div class="text-center mb-8">
                        <h1 class="text-4xl font-black tracking-widest italic text-blue-600 mb-1">SatyaID</h1>
                        <p class="text-gray-400 text-sm">Secure Document Portal</p>
                    </div>
            
                    <form id="uploadForm" class="space-y-6" enctype="multipart/form-data">
            
                        <div>
                            <label for="doc_type"
                                class="block text-xs font-semibold text-gray-400 uppercase tracking-widest mb-2 ml-1">Document
                                Type</label>
                            <select id="doc_type"
                                class="w-full p-4 border border-gray-700 rounded-2xl focus:ring-2 focus:ring-blue-400 bg-gray-700 text-white cursor-pointer outline-none transition">
            
                                <option value="" disabled selected>Select Document</option>
                                <option value="Aadhaar">Aadhaar Card</option>
                                <option value="PAN">PAN Card</option>
                            </select>
                        </div>
            
                        <div id="upload-container" class="space-y-6">
            
                            <!-- Aadhaar (2 files) -->
                            <div id="aadhaar-upload" class="hidden space-y-4">
            
                                <!-- Front -->
                                <div
                                    class="drop-zone border-2 border-dashed border-gray-700 rounded-3xl p-6 text-center bg-gray-900/50 hover:border-blue-400 cursor-pointer">
                                    <input type="file" id="aadhaar_front" class="hidden" accept=".jpg,.jpeg">
                                    <div class="flex flex-col items-center">
                                        <p class="file-name text-blue-400 font-semibold hidden"></p>
                                        <p class="label text-gray-400">Front Side (.jpg)</p>
                                    </div>
                                </div>
            
                                <!-- Back -->
                                <div
                                    class="drop-zone border-2 border-dashed border-gray-700 rounded-3xl p-6 text-center bg-gray-900/50 hover:border-blue-400 cursor-pointer">
                                    <input type="file" id="aadhaar_back" class="hidden" accept=".jpg,.jpeg">
                                    <div class="flex flex-col items-center">
                                        <p class="file-name text-blue-400 font-semibold hidden"></p>
                                        <p class="label text-gray-400">Back Side (.jpg)</p>
                                    </div>
                                </div>
            
                            </div>
            
                            <!-- PAN (1 file) -->
                            <div id="pan-upload" class="hidden">
                                <div
                                    class="drop-zone border-2 border-dashed border-gray-700 rounded-3xl p-6 text-center bg-gray-900/50 hover:border-blue-400 cursor-pointer">
                                    <input type="file" id="pan_file" class="hidden" accept=".jpg,.jpeg">
                                    <div class="flex flex-col items-center">
                                        <p class="file-name text-blue-400 font-semibold hidden"></p>
                                        <p class="label text-gray-400">PAN Card (.jpg)</p>
                                    </div>
                                </div>
                            </div>
            
                        </div>
            
                        <button type="submit"
                            class="w-full bg-blue-600 hover:bg-blue-700 text-white p-4 rounded-2xl font-bold shadow-xl transition duration-300 transform active:scale-95">
                            START VERIFICATION
                        </button>
                    </form>
                </div>
            </div>
        </div>

    <div id="loading" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50">
        <div class="bg-white dark:bg-gray-800 p-8 rounded-3xl shadow-2xl text-center border border-gray-700">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mx-auto mb-4"></div>
            <p class="text-white font-bold">Processing Document...</p>
        </div>
    </div>

    <script>
        const uploadForm = document.getElementById('uploadForm');
        const loadingOverlay = document.getElementById('loading');
        const docType = document.getElementById('doc_type');

        const aadhaarUpload = document.getElementById('aadhaar-upload');
        const panUpload = document.getElementById('pan-upload');


        // ✅ SHOW/HIDE BASED ON DOCUMENT TYPE
        docType.addEventListener('change', () => {
            aadhaarUpload.classList.add('hidden');
            panUpload.classList.add('hidden');

            if (docType.value === 'Aadhaar') {
                aadhaarUpload.classList.remove('hidden');
            } else if (docType.value === 'PAN') {
                panUpload.classList.remove('hidden');
            }
        });


        // ✅ DROP ZONE FUNCTIONALITY (FOR ALL BOXES)
        document.querySelectorAll('.drop-zone').forEach(zone => {
            const input = zone.querySelector('input');
            const fileName = zone.querySelector('.file-name');
            const label = zone.querySelector('.label');

            zone.addEventListener('click', () => input.click());

            ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
                zone.addEventListener(eventName, (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                });
            });

            zone.addEventListener('dragover', () => zone.classList.add('drag-over'));
            zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));

            zone.addEventListener('drop', (e) => {
                zone.classList.remove('drag-over');
                const files = e.dataTransfer.files;

                if (files.length) {
                    input.files = files;
                    updateUI(files[0]);
                }
            });

            input.addEventListener('change', () => {
                if (input.files.length) {
                    updateUI(input.files[0]);
                }
            });

            function updateUI(file) {
                fileName.textContent = file.name;
                fileName.classList.remove('hidden');

                label.classList.remove('text-gray-400');
                label.classList.add('text-gray-500');

                zone.classList.add('border-blue-500', 'bg-gray-800');
            }
        });


        // ✅ FORM SUBMIT (PAN + AADHAAR LOGIC)
        uploadForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const formData = new FormData();
            const type = docType.value;

            if (!type) {
                alert("Please select a document type");
                return;
            }

            formData.append('doc_type', type);

            // 🔵 AADHAAR
            if (type === 'Aadhaar') {
                const front = document.getElementById('aadhaar_front').files[0];
                const back = document.getElementById('aadhaar_back').files[0];

                if (!front || !back) {
                    alert("Please upload both Aadhaar front and back");
                    return;
                }

                formData.append('front', front);
                formData.append('back', back);
            }

            // 🟢 PAN
            else if (type === 'PAN') {
                const file = document.getElementById('pan_file').files[0];

                if (!file) {
                    alert("Please upload PAN card");
                    return;
                }

                formData.append('file', file); // ✅ IMPORTANT
            }

            loadingOverlay.classList.remove('hidden');

            try {
                const res = await fetch('http://127.0.0.1:5000/verify', {
                    method: 'POST',
                    body: formData
                });

                const data = await res.json();
                loadingOverlay.classList.add('hidden');

                alert(`Result: ${data.status}`);

            } catch (error) {
                loadingOverlay.classList.add('hidden');
                alert("Upload failed. Ensure server is running.");
            }
        });


        // 🔒 BLOCK BACK NAVIGATION
        (function () {
            function blockNavigation() {
                history.pushState(null, null, location.href);
            }

            blockNavigation();

            window.addEventListener('popstate', blockNavigation);
        })();
    </script>
</body>
</html>
