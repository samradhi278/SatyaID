<!DOCTYPE html>
<html>
<head>
    <title>SatyaID</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="flex justify-center items-center min-h-screen bg-white">

<div class="w-80 perspective">
    <!-- Card -->
    <div class="bg-white p-8 rounded-2xl shadow-2xl transform hover:scale-105 transition duration-500 ease-in-out">

        <!-- Logo -->
        <img src="{{ url_for('static', filename='images/logo.png') }}"
             class="mx-auto w-32 mb-6">

        <!-- Title -->
        <h1 class="text-3xl text-blue-600 font-bold mb-1 text-center">SatyaID</h1>
        <p class="text-blue-500 text-sm mb-6 text-center">Fake Document Detection System</p>

        <!-- Role Selection Form -->
        <form action="/next" method="POST" class="mb-4">

            <select name="role" class="w-full border border-gray-300 p-3 mb-4 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400" required>
                <option value="">Select Role</option>
                <option value="User">User</option>
                <option value="Official">Official</option>
            </select>

            <button class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold shadow-md hover:bg-blue-700 transition duration-300">
                NEXT
            </button>

        </form>

        <!-- Already a User -->
        <button onclick="window.location.href='/login'"
                class="w-full border border-gray-300 py-3 rounded-lg font-semibold hover:bg-gray-100 transition duration-300">
            Already a user? LOGIN
        </button>

    </div>
</div>

</body>
</html>
